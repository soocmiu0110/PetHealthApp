<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Pet Health Tracker</title>

<style>
body {
  font-family: Arial;
  margin: 0;
  background: #f4f6f8;
}

header {
  background: #4A90E2;
  color: white;
  padding: 15px;
  text-align: center;
}

.container {
  padding: 15px;
}

.card {
  background: white;
  padding: 15px;
  margin-bottom: 15px;
  border-radius: 12px;
  box-shadow: 0 2px 6px rgba(0,0,0,0.1);
}

input, select {
  width: 100%;
  padding: 10px;
  margin-top: 8px;
  margin-bottom: 10px;
  border-radius: 8px;
  border: 1px solid #ccc;
}

button {
  width: 100%;
  padding: 10px;
  background: #4A90E2;
  color: white;
  border: none;
  border-radius: 8px;
  cursor: pointer;
}

button:hover {
  background: #357ABD;
}

.record {
  background: #eef5ff;
  padding: 10px;
  margin-top: 8px;
  border-radius: 8px;
  font-size: 14px;
}
</style>
</head>

<body>

<header>
  🐶 Pet Health Tracker
</header>

<div class="container">

  <!-- PET INFO -->
  <div class="card">
    <h3>Pet Profile</h3>
    <input id="petName" placeholder="Pet name">
    <input id="petWeight" type="number" placeholder="Weight (kg)">
    <button onclick="savePet()">Save Pet</button>

    <p id="petInfo"></p>
  </div>

  <!-- ADD HEALTH -->
  <div class="card">
    <h3>Add Health Record</h3>

    <input id="weight" type="number" placeholder="Weight">
    <input id="activity" type="number" placeholder="Activity (0-100)">

    <select id="mood">
      <option value="good">Good</option>
      <option value="normal">Normal</option>
      <option value="bad">Bad</option>
    </select>

    <button onclick="addRecord()">Add Record</button>
  </div>

  <!-- HISTORY -->
  <div class="card">
    <h3>Health History</h3>
    <div id="history"></div>
  </div>

</div>

<script>
// ===== LOAD DATA =====
let pet = JSON.parse(localStorage.getItem("pet")) || null;
let records = JSON.parse(localStorage.getItem("records")) || [];

// ===== RENDER =====
function renderPet() {
  const el = document.getElementById("petInfo");

  if (!pet) {
    el.innerHTML = "No pet yet";
    return;
  }

  el.innerHTML = `
    <b>Name:</b> ${pet.name} <br>
    <b>Weight:</b> ${pet.weight} kg
  `;
}

function renderHistory() {
  const el = document.getElementById("history");
  el.innerHTML = "";

  if (records.length === 0) {
    el.innerHTML = "No records yet";
    return;
  }

  records.slice().reverse().forEach(r => {
    el.innerHTML += `
      <div class="record">
        <b>Weight:</b> ${r.weight} kg <br>
        <b>Activity:</b> ${r.activity} <br>
        <b>Mood:</b> ${r.mood} <br>
        <b>Date:</b> ${new Date(r.date).toLocaleString()}
      </div>
    `;
  });
}

// ===== SAVE PET =====
function savePet() {
  const name = document.getElementById("petName").value;
  const weight = document.getElementById("petWeight").value;

  pet = {
    name,
    weight
  };

  localStorage.setItem("pet", JSON.stringify(pet));
  renderPet();
}

// ===== ADD RECORD =====
function addRecord() {
  const weight = document.getElementById("weight").value;
  const activity = document.getElementById("activity").value;
  const mood = document.getElementById("mood").value;

  const record = {
    weight,
    activity,
    mood,
    date: new Date()
  };

  records.push(record);
  localStorage.setItem("records", JSON.stringify(records));

  renderHistory();
}

// ===== INIT =====
renderPet();
renderHistory();
</script>

</body>
</html>
